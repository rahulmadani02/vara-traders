<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkout — Vara Traders</title>
<link rel="icon" type="image/png" href="/images/logo-icon.png" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<div class="topbar">
  <div class="container">
    <span>📞 +353 1 234 5678 &nbsp;|&nbsp; Free delivery on orders above €49</span>
    <span><a href="/account.html">Track order</a> &nbsp;|&nbsp; <a href="/contact.html">Help</a></span>
  </div>
</div>

<header class="site-header">
  <div class="container header-row">
    <a href="/index.html" class="brand">
      <img src="/images/logo.png" alt="Vara Traders logo" class="brand-mark" />
      <span class="brand-text"><h1>Vara Traders</h1><span>Indian Groceries</span></span>
    </a>
    <nav class="main-nav">
      <a href="/index.html">Home</a>
      <a href="/shop.html">Shop</a>
      <a href="/about.html">About</a>
      <a href="/contact.html">Contact</a>
    </nav>
    <div class="header-actions">
      <div id="account-slot"></div>
      <a href="/cart.html" class="icon-link">🛒 Cart <span class="cart-count">0</span></a>
    </div>
  </div>
</header>

<div class="page-head container">
  <h2>Checkout</h2>
</div>

<div class="container">
  <div class="checkout-layout" id="checkout-layout">
    <div class="spinner"></div>
  </div>
</div>

<footer class="site-footer">
  <div class="container">
    <div class="footer-bottom"><span>© 2026 Vara Traders. All rights reserved.</span><span>Weighed with care, since day one.</span></div>
  </div>
</footer>

<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/common.js"></script>
<script>
let cartItems = Cart.get();
let priced = null;

async function init() {
  const layout = document.getElementById('checkout-layout');
  if (!cartItems.length) {
    layout.innerHTML = `<div class="empty-state" style="grid-column:1/-1;"><h3>Your cart is empty</h3><a href="/shop.html" class="btn btn-primary">Browse groceries</a></div>`;
    return;
  }

  const user = Auth.getUser();

  layout.innerHTML = `
    <div>
      <div class="checkout-section">
        <h4>Delivery details</h4>
        <div id="form-alert"></div>
        <form id="checkout-form">
          <div class="form-group">
            <label for="name">Full name</label>
            <input type="text" id="name" required value="${user ? escapeHtml(user.name) : ''}" />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="phone">Phone number</label>
              <input type="tel" id="phone" required placeholder="e.g. 087 123 4567" value="${user && user.phone ? escapeHtml(user.phone) : ''}" />
            </div>
            <div class="form-group">
              <label for="email">Email <span style="font-weight:400;color:var(--ledger-soft);">(for order confirmation)</span></label>
              <input type="email" id="checkout-email" placeholder="you@example.com" value="${user && user.email ? escapeHtml(user.email) : ''}" />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="eircode">Eircode</label>
              <input type="text" id="eircode" required placeholder="e.g. D02 AF30" style="text-transform:uppercase;" />
            </div>
          </div>
          <div class="form-group">
            <label for="address">Address (house/apt no., street, area)</label>
            <textarea id="address" rows="2" required></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="city">Town / City</label>
              <input type="text" id="city" required />
            </div>
            <div class="form-group">
              <label for="county">County</label>
              <input type="text" id="county" required placeholder="e.g. Dublin" />
            </div>
          </div>
        </form>
      </div>

      <div class="checkout-section">
        <h4>Payment method</h4>
        <div class="payment-option selected" data-method="cod">
          <input type="radio" name="payment" value="cod" checked /> Cash on Delivery
        </div>
        <div class="payment-option" data-method="online">
          <input type="radio" name="payment" value="online" /> Pay online (UPI / Card / Netbanking)
        </div>
        <p style="font-size:12.5px;color:var(--ledger-soft);margin-top:10px;">
          Online payment requires a payment gateway (e.g. Razorpay) to be connected on the server. See README for setup — for now, orders are recorded with payment marked pending.
        </p>
      </div>
    </div>

    <div class="summary-card">
      <h4 style="margin-bottom:14px;">Order summary</h4>
      <div id="summary-items"></div>
      <div id="summary-totals"><div class="spinner"></div></div>
      <button id="place-order-btn" class="btn btn-primary btn-block" style="margin-top:14px;">Place order</button>
    </div>
  `;

  document.querySelectorAll('.payment-option').forEach((el) => {
    el.addEventListener('click', () => {
      document.querySelectorAll('.payment-option').forEach((o) => o.classList.remove('selected'));
      el.classList.add('selected');
      el.querySelector('input').checked = true;
    });
  });

  await loadSummary();
  document.getElementById('place-order-btn').addEventListener('click', placeOrder);
}

async function loadSummary() {
  const itemsEl = document.getElementById('summary-items');
  itemsEl.innerHTML = cartItems.map((i) => `
    <div class="summary-row"><span>${escapeHtml(i.name)} (${escapeHtml(i.variantLabel)}) × ${i.qty}</span><span>${formatINR(i.price * i.qty)}</span></div>
  `).join('');

  try {
    const priceReq = cartItems.map((i) => ({ productId: i.productId, variantId: i.variantId, qty: i.qty, name: i.name }));
    priced = await Api.priceCart(priceReq);
    const totalsEl = document.getElementById('summary-totals');
    if (priced.issues && priced.issues.length) {
      totalsEl.innerHTML = `<div class="alert alert-error">${priced.issues.map(escapeHtml).join('<br/>')}</div>`;
      document.getElementById('place-order-btn').disabled = true;
    } else {
      totalsEl.innerHTML = `
        <div class="summary-row"><span>Subtotal</span><span>${formatINR(priced.subtotal)}</span></div>
        <div class="summary-row"><span>Delivery</span><span>${priced.deliveryFee === 0 ? 'FREE' : formatINR(priced.deliveryFee)}</span></div>
        <div class="summary-row total"><span>Total</span><span>${formatINR(priced.total)}</span></div>
      `;
    }
  } catch (err) {
    document.getElementById('summary-totals').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
  }
}

async function placeOrder() {
  const form = document.getElementById('checkout-form');
  if (!form.reportValidity()) return;

  const btn = document.getElementById('place-order-btn');
  btn.disabled = true;
  btn.textContent = 'Placing order…';

  const customer = {
    name: document.getElementById('name').value.trim(),
    phone: document.getElementById('phone').value.trim(),
    email: document.getElementById('checkout-email').value.trim(),
    address: document.getElementById('address').value.trim(),
    city: document.getElementById('city').value.trim(),
    county: document.getElementById('county').value.trim(),
    eircode: document.getElementById('eircode').value.trim().toUpperCase(),
  };
  const paymentMethod = document.querySelector('input[name="payment"]:checked').value;

  try {
    const { order } = await Api.placeOrder({
      items: cartItems.map((i) => ({ productId: i.productId, variantId: i.variantId, qty: i.qty, name: i.name })),
      customer,
      paymentMethod,
    });
    Cart.clear();
    window.location.href = `/order-success.html?id=${order.id}`;
  } catch (err) {
    document.getElementById('form-alert').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}${err.issues ? '<br/>' + err.issues.map(escapeHtml).join('<br/>') : ''}</div>`;
    btn.disabled = false;
    btn.textContent = 'Place order';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

if (!Auth.isLoggedIn()) {
  toast('Tip: log in first to save this order to your account.', false);
}

init();
</script>
</body>
</html>
