<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Log In — Vara Traders</title>
<link rel="icon" type="image/png" href="/images/logo-icon.png" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<header class="site-header">
  <div class="container header-row">
    <a href="/index.html" class="brand">
      <img src="/images/logo.png" alt="Vara Traders logo" class="brand-mark" />
      <span class="brand-text"><h1>Vara Traders</h1><span>Indian Groceries</span></span>
    </a>
    <nav class="main-nav"><a href="/index.html">Home</a><a href="/shop.html">Shop</a></nav>
    <div class="header-actions"><div id="account-slot"></div></div>
  </div>
</header>

<div class="container" style="padding:56px 24px;">
  <div class="form-card">
    <h2 class="text-center" style="margin-bottom:22px;">Log in</h2>
    <div id="form-alert"></div>
    <form id="login-form">
      <div class="form-group">
        <label for="identifier">Email or phone number</label>
        <input type="text" id="identifier" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Log in</button>
    </form>
    <p class="form-note">New here? <a href="/register.html" style="color:var(--peacock);font-weight:600;">Create an account</a></p>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/common.js"></script>
<script>
if (Auth.isLoggedIn()) window.location.href = '/account.html';

const redirectTo = new URLSearchParams(window.location.search).get('redirect');

document.getElementById('login-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Logging in…';
  try {
    const { token, user } = await Api.login({
      identifier: document.getElementById('identifier').value.trim(),
      password: document.getElementById('password').value,
    });
    Auth.setToken(token);
    Auth.setUser(user);
    if (redirectTo) window.location.href = redirectTo;
    else if (user.role === 'admin') window.location.href = '/admin/dashboard.html';
    else window.location.href = '/index.html';
  } catch (err) {
    document.getElementById('form-alert').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
    btn.disabled = false;
    btn.textContent = 'Log in';
  }
});
</script>
</body>
</html>
