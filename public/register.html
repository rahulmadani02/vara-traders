<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Create Account — Vara Traders</title>
<link rel="icon" type="image/png" href="/images/logo-icon.png" />
<link rel="stylesheet" href="/css/style.css" />
</head>
<body>
<header class="site-header">
  <div class="container header-row">
    <a href="/index.html" class="brand">
      <img src="/images/logo.png" alt="Vara Traders logo" class="brand-mark" />
      <span class="brand-text"><h1>Vara Traders</h1><span>Indian Groceries</span></span>
    </a>
    <nav class="main-nav"><a href="/index.html">Home</a><a href="/shop.html">Shop</a></nav>
    <div class="header-actions"><div id="account-slot"></div></div>
  </div>
</header>

<div class="container" style="padding:56px 24px;">
  <div class="form-card">
    <h2 class="text-center" style="margin-bottom:22px;">Create your account</h2>
    <div id="form-alert"></div>
    <form id="register-form">
      <div class="form-group">
        <label for="name">Full name</label>
        <input type="text" id="name" required />
      </div>
      <div class="form-group">
        <label for="email">Email <span style="font-weight:400;color:var(--ledger-soft);">(or fill phone instead)</span></label>
        <input type="email" id="email" autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="phone">Phone number <span style="font-weight:400;color:var(--ledger-soft);">(or fill email instead)</span></label>
        <input type="tel" id="phone" placeholder="e.g. 087 123 4567" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" required minlength="6" autocomplete="new-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-block" id="submit-btn">Create account</button>
    </form>
    <p class="form-note">Already have an account? <a href="/login.html" style="color:var(--peacock);font-weight:600;">Log in</a></p>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/cart.js"></script>
<script src="/js/common.js"></script>
<script>
if (Auth.isLoggedIn()) window.location.href = '/account.html';

document.getElementById('register-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const phone = document.getElementById('phone').value.trim();

  if (!email && !phone) {
    document.getElementById('form-alert').innerHTML = `<div class="alert alert-error">Enter an email address or a phone number.</div>`;
    return;
  }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Creating account…';
  try {
    const { user } = await Api.register({
      name: document.getElementById('name').value.trim(),
      email,
      phone,
      password: document.getElementById('password').value,
    });

    // NOTE: we deliberately do NOT auto-login here (no Auth.setToken/setUser).
    // The person registers, sees confirmation, then logs in themselves —
    // a more standard, transparent flow than silently signing them in.
    document.querySelector('.form-card').innerHTML = `
      <div style="text-align:center;">
        <div style="font-size:40px;margin-bottom:10px;">✅</div>
        <h2 style="margin-bottom:10px;">Account created!</h2>
        <p style="color:var(--ledger-soft);">Welcome to Vara Traders, ${escapeHtml(user.name.split(' ')[0])}. Please log in to continue.</p>
      </div>
    `;
    setTimeout(() => { window.location.href = '/login.html'; }, 1800);
  } catch (err) {
    document.getElementById('form-alert').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
    btn.disabled = false;
    btn.textContent = 'Create account';
  }
});
</script>
</body>
</html>
