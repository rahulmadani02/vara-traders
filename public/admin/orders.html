<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage Orders — Vara Traders Admin</title>
<link rel="icon" type="image/png" href="/images/logo-icon.png" />
<link rel="stylesheet" href="/css/style.css" />
<style>
  .admin-shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  .admin-sidebar { background: var(--ledger); color: var(--husk); padding: 24px 18px; }
  .admin-sidebar a { display: block; padding: 10px 12px; border-radius: var(--radius); font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(239,234,217,0.12); color: var(--turmeric); }
  .admin-main { padding: 32px 36px; }
  table.admin-table { width: 100%; border-collapse: collapse; background: var(--paper); border: 1.5px solid var(--ledger); border-radius: var(--radius); overflow: hidden; margin-top: 12px; }
  table.admin-table th, table.admin-table td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 13.5px; vertical-align: top; }
  table.admin-table th { background: var(--husk-dark); font-family: var(--font-mono); font-size: 11.5px; text-transform: uppercase; }
  table.admin-table select { border: 1.5px solid var(--ledger); border-radius: var(--radius); padding: 6px 8px; font-size: 12.5px; }
  .filters-bar { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; margin-bottom: 8px; }
  .filters-bar .form-group { margin-bottom: 0; min-width: 160px; }
  .filters-bar label { font-size: 11.5px; }
  .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 18px; align-items: center; }
  .pagination button { border: 1.5px solid var(--ledger); background: var(--paper); border-radius: var(--radius); padding: 6px 12px; font-size: 13px; font-weight: 600; }
  .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
  .pagination span { font-family: var(--font-mono); font-size: 12.5px; color: var(--ledger-soft); }
  @media (max-width: 900px) { .admin-shell { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div style="font-family:var(--font-display);font-size:18px;margin-bottom:24px;">🛠 Vara Admin</div>
    <a href="/admin/dashboard.html">Dashboard</a>
    <a href="/admin/products.html">Products</a>
    <a href="/admin/orders.html" class="active">Orders</a>
    <a href="/index.html" style="margin-top:20px;opacity:0.7;">← Back to storefront</a>
    <a href="#" id="logout-link" style="opacity:0.7;">Log out</a>
  </aside>
  <main class="admin-main">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:6px;">
      <h2>Orders</h2>
      <button class="btn btn-outline btn-sm" id="export-btn">⬇ Export to Excel (CSV)</button>
    </div>
    <p style="color:var(--ledger-soft);margin-bottom:16px;">Update fulfilment status as orders move through packing and delivery.</p>

    <div class="filters-bar">
      <div class="form-group">
        <label for="filter-status">Status</label>
        <select id="filter-status">
          <option value="">All statuses</option>
          <option value="placed">Placed</option>
          <option value="confirmed">Confirmed</option>
          <option value="packed">Packed</option>
          <option value="shipped">Shipped</option>
          <option value="delivered">Delivered</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="form-group">
        <label for="filter-from">From date</label>
        <input type="date" id="filter-from" />
      </div>
      <div class="form-group">
        <label for="filter-to">To date</label>
        <input type="date" id="filter-to" />
      </div>
      <div class="form-group">
        <label for="filter-search">Search customer</label>
        <input type="text" id="filter-search" placeholder="Name or phone" />
      </div>
      <button class="btn btn-sm btn-outline" id="clear-filters-btn">Clear filters</button>
    </div>

    <div id="orders-root"><div class="spinner"></div></div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script>
(async function guard() {
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) {
    window.location.href = '/login.html?redirect=/admin/orders.html';
  }
})();
document.getElementById('logout-link').addEventListener('click', (e) => { e.preventDefault(); Auth.logout(); });

const STATUSES = ['placed', 'confirmed', 'packed', 'shipped', 'delivered', 'cancelled'];
const PAGE_SIZE = 20;
let allOrders = [];
let currentPage = 1;

async function loadOrders() {
  const root = document.getElementById('orders-root');
  try {
    const { orders } = await Api.adminOrders();
    allOrders = orders;
    currentPage = 1;
    renderFilteredOrders();
  } catch (err) {
    root.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
  }
}

function applyFilters() {
  const status = document.getElementById('filter-status').value;
  const from = document.getElementById('filter-from').value;
  const to = document.getElementById('filter-to').value;
  const search = document.getElementById('filter-search').value.trim().toLowerCase();

  return allOrders.filter((o) => {
    if (status && o.status !== status) return false;
    if (from && new Date(o.createdAt) < new Date(from)) return false;
    if (to && new Date(o.createdAt) > new Date(to + 'T23:59:59')) return false;
    if (search && !(o.customer.name.toLowerCase().includes(search) || o.customer.phone.includes(search))) return false;
    return true;
  });
}

function renderFilteredOrders() {
  const filtered = applyFilters();
  const totalPages = Math.max(1, Math.ceil(filtered.length / PAGE_SIZE));
  if (currentPage > totalPages) currentPage = totalPages;
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageOrders = filtered.slice(start, start + PAGE_SIZE);

  const root = document.getElementById('orders-root');
  root.innerHTML = `
    <table class="admin-table">
      <thead><tr><th>Order</th><th>Customer</th><th>Items</th><th>Total</th><th>Payment</th><th>Status</th></tr></thead>
      <tbody>
        ${pageOrders.map((o) => `
          <tr>
            <td>#${o.id}<br/><span style="color:var(--ledger-soft);font-size:11.5px;">${new Date(o.createdAt).toLocaleDateString('en-IE')}</span></td>
            <td>${escapeHtml(o.customer.name)}<br/><span style="color:var(--ledger-soft);">${escapeHtml(o.customer.phone)}</span></td>
            <td>${o.items.map((i) => `${escapeHtml(i.productName)} (${escapeHtml(i.variantLabel)}) ×${i.qty}`).join('<br/>')}</td>
            <td>${formatINR(o.total)}</td>
            <td>${o.paymentMethod === 'cod' ? 'COD' : 'Online'}</td>
            <td>
              <select data-order="${o.id}">
                ${STATUSES.map((s) => `<option value="${s}" ${o.status === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </td>
          </tr>
        `).join('') || `<tr><td colspan="6">No orders match these filters.</td></tr>`}
      </tbody>
    </table>
    <div class="pagination">
      <button id="prev-page" ${currentPage <= 1 ? 'disabled' : ''}>← Prev</button>
      <span>Page ${currentPage} of ${totalPages} (${filtered.length} order${filtered.length === 1 ? '' : 's'})</span>
      <button id="next-page" ${currentPage >= totalPages ? 'disabled' : ''}>Next →</button>
    </div>
  `;

  document.querySelectorAll('select[data-order]').forEach((sel) => {
    sel.addEventListener('change', async () => {
      try {
        await Api.adminUpdateOrderStatus(sel.dataset.order, sel.value);
        const order = allOrders.find((o) => String(o.id) === String(sel.dataset.order));
        if (order) order.status = sel.value;
        toast(`Order #${sel.dataset.order} marked ${sel.value}`);
      } catch (err) {
        toast(err.message, true);
      }
    });
  });

  document.getElementById('prev-page').addEventListener('click', () => { currentPage--; renderFilteredOrders(); });
  document.getElementById('next-page').addEventListener('click', () => { currentPage++; renderFilteredOrders(); });
}

['filter-status', 'filter-from', 'filter-to', 'filter-search'].forEach((id) => {
  document.getElementById(id).addEventListener('input', () => { currentPage = 1; renderFilteredOrders(); });
});
document.getElementById('clear-filters-btn').addEventListener('click', () => {
  document.getElementById('filter-status').value = '';
  document.getElementById('filter-from').value = '';
  document.getElementById('filter-to').value = '';
  document.getElementById('filter-search').value = '';
  currentPage = 1;
  renderFilteredOrders();
});

// CSV export needs the login token attached, so we fetch it manually and
// trigger the download via a Blob instead of a plain <a href> link.
document.getElementById('export-btn').addEventListener('click', async () => {
  const btn = document.getElementById('export-btn');
  btn.disabled = true;
  btn.textContent = 'Exporting…';
  try {
    const res = await fetch('/api/admin/orders/export', {
      headers: { Authorization: `Bearer ${Auth.getToken()}` },
    });
    if (!res.ok) throw new Error('Export failed — try again.');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `vara-traders-orders-${new Date().toISOString().slice(0, 10)}.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
    toast('Orders exported successfully');
  } catch (err) {
    toast(err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = '⬇ Export to Excel (CSV)';
  }
});

loadOrders();
</script>
</body>
</html>
