<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Dashboard — Vara Traders</title>
<link rel="icon" type="image/png" href="/images/logo-icon.png" />
<link rel="stylesheet" href="/css/style.css" />
<style>
  .admin-shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  .admin-sidebar { background: var(--ledger); color: var(--husk); padding: 24px 18px; }
  .admin-sidebar a { display: block; padding: 10px 12px; border-radius: var(--radius); font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(239,234,217,0.12); color: var(--turmeric); }
  .admin-main { padding: 32px 36px; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: var(--paper); border: 1.5px solid var(--ledger); border-radius: var(--radius); padding: 18px; }
  .stat-card .num { font-family: var(--font-mono); font-size: 26px; font-weight: 700; }
  .stat-card .label { font-size: 12.5px; color: var(--ledger-soft); }
  table.admin-table { width: 100%; border-collapse: collapse; background: var(--paper); border: 1.5px solid var(--ledger); border-radius: var(--radius); overflow: hidden; }
  table.admin-table th, table.admin-table td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 13.5px; }
  table.admin-table th { background: var(--husk-dark); font-family: var(--font-mono); font-size: 11.5px; text-transform: uppercase; }
  @media (max-width: 900px) { .admin-shell { grid-template-columns: 1fr; } .stat-grid { grid-template-columns: repeat(2,1fr); } }
</style>
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div style="font-family:var(--font-display);font-size:18px;margin-bottom:24px;">🛠 Vara Admin</div>
    <a href="/admin/dashboard.html" class="active">Dashboard</a>
    <a href="/admin/products.html">Products</a>
    <a href="/admin/orders.html">Orders</a>
    <a href="/admin/customers.html">Customers</a>
    <a href="/index.html" style="margin-top:20px;opacity:0.7;">← Back to storefront</a>
    <a href="#" id="logout-link" style="opacity:0.7;">Log out</a>
  </aside>
  <main class="admin-main">
    <h2 style="margin-bottom:6px;">Dashboard</h2>
    <p style="color:var(--ledger-soft);margin-bottom:28px;">Overview of orders, revenue and stock.</p>
    <div id="stats-root"><div class="spinner"></div></div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script>
(async function guard() {
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) {
    window.location.href = '/login.html?redirect=/admin/dashboard.html';
  }
})();

document.getElementById('logout-link').addEventListener('click', (e) => { e.preventDefault(); Auth.logout(); });

async function loadStats() {
  const root = document.getElementById('stats-root');
  try {
    const s = await Api.adminStats();
    root.innerHTML = `
      <div class="stat-grid">
        <div class="stat-card"><div class="num">${s.totalOrders}</div><div class="label">Total orders</div></div>
        <div class="stat-card"><div class="num">${formatINR(s.totalRevenue)}</div><div class="label">Revenue (COD + paid)</div></div>
        <div class="stat-card"><div class="num">${s.totalProducts}</div><div class="label">Products</div></div>
        <div class="stat-card"><div class="num">${s.totalCustomers}</div><div class="label">Customers</div></div>
      </div>

      ${s.lowStockCount > 0 ? `
        <div class="alert alert-error" style="max-width:640px;">
          ⚠️ ${s.lowStockCount} product(s) low on stock — check the Products page.
        </div>
      ` : ''}

      <h3 style="margin:24px 0 12px;font-size:18px;">Recent orders</h3>
      <table class="admin-table">
        <thead><tr><th>Order</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Placed</th></tr></thead>
        <tbody>
          ${s.recentOrders.map((o) => `
            <tr>
              <td>#${o.id}</td>
              <td>${escapeHtml(o.customer.name)}</td>
              <td>${o.items.length} item(s)</td>
              <td>${formatINR(o.total)}</td>
              <td><span class="status-badge status-${o.status}">${o.status}</span></td>
              <td>${new Date(o.createdAt).toLocaleDateString('en-IE')}</td>
            </tr>
          `).join('') || '<tr><td colspan="6">No orders yet.</td></tr>'}
        </tbody>
      </table>
    `;
  } catch (err) {
    root.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
  }
}

loadStats();
</script>
</body>
</html>
