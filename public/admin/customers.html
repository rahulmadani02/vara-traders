<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Customers — Vara Traders Admin</title>
<link rel="icon" type="image/png" href="/images/logo-icon.png" />
<link rel="stylesheet" href="/css/style.css" />
<style>
  .admin-shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  .admin-sidebar { background: var(--ledger); color: var(--husk); padding: 24px 18px; }
  .admin-sidebar a { display: block; padding: 10px 12px; border-radius: var(--radius); font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(239,234,217,0.12); color: var(--turmeric); }
  .admin-main { padding: 32px 36px; }
  table.admin-table { width: 100%; border-collapse: collapse; background: var(--paper); border: 1.5px solid var(--ledger); border-radius: var(--radius); overflow: hidden; margin-top: 12px; }
  table.admin-table th, table.admin-table td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 13.5px; vertical-align: top; }
  table.admin-table th { background: var(--husk-dark); font-family: var(--font-mono); font-size: 11.5px; text-transform: uppercase; }
  @media (max-width: 900px) { .admin-shell { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div style="font-family:var(--font-display);font-size:18px;margin-bottom:24px;">🛠 Vara Admin</div>
    <a href="/admin/dashboard.html">Dashboard</a>
    <a href="/admin/products.html">Products</a>
    <a href="/admin/orders.html">Orders</a>
    <a href="/admin/customers.html" class="active">Customers</a>
    <a href="/index.html" style="margin-top:20px;opacity:0.7;">← Back to storefront</a>
    <a href="#" id="logout-link" style="opacity:0.7;">Log out</a>
  </aside>
  <main class="admin-main">
    <h2 style="margin-bottom:6px;">Customers</h2>
    <p style="color:var(--ledger-soft);margin-bottom:12px;" id="customer-count"></p>
    <div style="margin-bottom:16px;">
      <input type="text" id="search-input" placeholder="Search by name, email or phone…" style="width:100%;max-width:360px;border:1.5px solid var(--ledger);border-radius:var(--radius);padding:9px 12px;font-size:14px;" />
    </div>
    <div id="customers-root"><div class="spinner"></div></div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script>
(async function guard() {
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) {
    window.location.href = '/login.html?redirect=/admin/customers.html';
  }
})();
document.getElementById('logout-link').addEventListener('click', (e) => { e.preventDefault(); Auth.logout(); });

let allCustomers = [];

async function loadCustomers() {
  const root = document.getElementById('customers-root');
  try {
    const { customers } = await Api.adminCustomers();
    allCustomers = customers.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    document.getElementById('customer-count').textContent = `${allCustomers.length} registered customer${allCustomers.length === 1 ? '' : 's'}`;
    renderCustomers(allCustomers);
  } catch (err) {
    root.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
  }
}

function renderCustomers(customers) {
  const root = document.getElementById('customers-root');
  root.innerHTML = `
    <table class="admin-table">
      <thead><tr><th>Name</th><th>Email</th><th>Phone</th><th>Joined</th></tr></thead>
      <tbody>
        ${customers.map((c) => `
          <tr>
            <td>${escapeHtml(c.name)}</td>
            <td>${c.email ? escapeHtml(c.email) : '<span style="color:var(--ledger-soft);">—</span>'}</td>
            <td>${c.phone ? escapeHtml(c.phone) : '<span style="color:var(--ledger-soft);">—</span>'}</td>
            <td>${new Date(c.createdAt).toLocaleDateString('en-IE')}</td>
          </tr>
        `).join('') || '<tr><td colspan="4">No customers match your search.</td></tr>'}
      </tbody>
    </table>
  `;
}

document.getElementById('search-input').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { renderCustomers(allCustomers); return; }
  const filtered = allCustomers.filter((c) =>
    c.name.toLowerCase().includes(q) ||
    (c.email && c.email.toLowerCase().includes(q)) ||
    (c.phone && c.phone.includes(q))
  );
  renderCustomers(filtered);
});

loadCustomers();
</script>
</body>
</html>
