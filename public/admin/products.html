<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Manage Products — Vara Traders Admin</title>
<link rel="icon" type="image/png" href="/images/logo-icon.png" />
<link rel="stylesheet" href="/css/style.css" />
<style>
  .admin-shell { display: grid; grid-template-columns: 220px 1fr; min-height: 100vh; }
  .admin-sidebar { background: var(--ledger); color: var(--husk); padding: 24px 18px; }
  .admin-sidebar a { display: block; padding: 10px 12px; border-radius: var(--radius); font-size: 14px; font-weight: 600; margin-bottom: 4px; }
  .admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(239,234,217,0.12); color: var(--turmeric); }
  .admin-main { padding: 32px 36px; }
  table.admin-table { width: 100%; border-collapse: collapse; background: var(--paper); border: 1.5px solid var(--ledger); border-radius: var(--radius); overflow: hidden; margin-top: 20px; }
  table.admin-table th, table.admin-table td { text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--line); font-size: 13.5px; vertical-align: top; }
  table.admin-table th { background: var(--husk-dark); font-family: var(--font-mono); font-size: 11.5px; text-transform: uppercase; }
  .variant-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
  .variant-row input { flex: 1; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(31,46,34,0.55); display: flex; align-items: center; justify-content: center; z-index: 200; }
  .modal-box { background: var(--paper); border: 1.5px solid var(--ledger); border-radius: var(--radius); padding: 28px; max-width: 560px; width: 92%; max-height: 88vh; overflow-y: auto; }
  @media (max-width: 900px) { .admin-shell { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="admin-shell">
  <aside class="admin-sidebar">
    <div style="font-family:var(--font-display);font-size:18px;margin-bottom:24px;">🛠 Vara Admin</div>
    <a href="/admin/dashboard.html">Dashboard</a>
    <a href="/admin/products.html" class="active">Products</a>
    <a href="/admin/orders.html">Orders</a>
    <a href="/admin/customers.html">Customers</a>
    <a href="/index.html" style="margin-top:20px;opacity:0.7;">← Back to storefront</a>
    <a href="#" id="logout-link" style="opacity:0.7;">Log out</a>
  </aside>
  <main class="admin-main">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
      <h2>Products</h2>
      <button class="btn btn-primary" id="new-product-btn">+ Add product</button>
    </div>
    <p style="color:var(--ledger-soft);margin-bottom:12px;">Manage your catalog — prices, stock and variants.</p>
    <div id="products-root"><div class="spinner"></div></div>
  </main>
</div>

<div id="modal-slot"></div>

<script src="/js/api.js"></script>
<script src="/js/common.js"></script>
<script>
(async function guard() {
  if (!Auth.isLoggedIn() || !Auth.isAdmin()) {
    window.location.href = '/login.html?redirect=/admin/products.html';
  }
})();
document.getElementById('logout-link').addEventListener('click', (e) => { e.preventDefault(); Auth.logout(); });

let categories = [];

async function loadProducts() {
  const root = document.getElementById('products-root');
  try {
    const [{ products }, catRes] = await Promise.all([Api.adminProducts(), Api.getCategories()]);
    categories = catRes.categories;
    root.innerHTML = `
      <table class="admin-table">
        <thead><tr><th>Name</th><th>Category</th><th>Variants</th><th>Status</th><th></th></tr></thead>
        <tbody>
          ${products.map((p) => `
            <tr>
              <td><strong>${escapeHtml(p.name)}</strong><br/><span style="color:var(--ledger-soft);">${escapeHtml(p.brand || '')}</span></td>
              <td>${escapeHtml(p.category)}</td>
              <td>${p.variants.map((v) => `${escapeHtml(v.label)}: ${formatINR(v.price)} (${v.stock} in stock)`).join('<br/>')}</td>
              <td>${p.active === false ? '<span class="status-badge status-cancelled">Inactive</span>' : '<span class="status-badge status-delivered">Active</span>'}</td>
              <td>
                <button class="btn btn-sm btn-outline" data-edit="${p.id}">Edit</button>
                <button class="btn btn-sm btn-danger" data-delete="${p.id}">Delete</button>
              </td>
            </tr>
          `).join('') || '<tr><td colspan="5">No products yet.</td></tr>'}
        </tbody>
      </table>
    `;

    document.querySelectorAll('[data-edit]').forEach((btn) => {
      btn.addEventListener('click', () => openModal(products.find((p) => p.id === Number(btn.dataset.edit))));
    });
    document.querySelectorAll('[data-delete]').forEach((btn) => {
      btn.addEventListener('click', () => deleteProduct(Number(btn.dataset.delete)));
    });
  } catch (err) {
    root.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
  }
}

async function deleteProduct(id) {
  if (!confirm('Delete this product? This cannot be undone.')) return;
  try {
    await Api.adminDeleteProduct(id);
    toast('Product deleted');
    loadProducts();
  } catch (err) {
    toast(err.message, true);
  }
}

function variantRowHtml(v = { label: '', price: '', stock: '' }) {
  return `
    <div class="variant-row">
      <input type="text" placeholder="Label (e.g. 1 kg)" class="v-label" value="${escapeHtml(v.label)}" />
      <input type="number" placeholder="Price €" class="v-price" value="${v.price}" min="0" step="0.01" />
      <input type="number" placeholder="Stock" class="v-stock" value="${v.stock}" min="0" />
      <button type="button" class="btn btn-sm btn-danger remove-variant">×</button>
    </div>
  `;
}

function openModal(product = null) {
  const isEdit = !!product;
  const variants = product ? product.variants : [{ label: '', price: '', stock: '' }];
  document.getElementById('modal-slot').innerHTML = `
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal-box">
        <h3 style="margin-bottom:16px;">${isEdit ? 'Edit product' : 'Add product'}</h3>
        <div id="modal-alert"></div>
        <form id="product-form">
          <div class="form-group"><label>Name</label><input type="text" id="p-name" required value="${product ? escapeHtml(product.name) : ''}" /></div>
          <div class="form-row">
            <div class="form-group"><label>Category</label>
              <select id="p-category" required>
                ${categories.map((c) => `<option value="${c.id}" ${product && product.category === c.id ? 'selected' : ''}>${escapeHtml(c.name)}</option>`).join('')}
              </select>
            </div>
            <div class="form-group"><label>Brand</label><input type="text" id="p-brand" value="${product ? escapeHtml(product.brand || '') : 'Vara Traders'}" /></div>
          </div>
          <div class="form-group"><label>Description</label><textarea id="p-desc" rows="2">${product ? escapeHtml(product.description || '') : ''}</textarea></div>
          <div class="form-group">
            <label>Variants (size / price / stock)</label>
            <div id="variant-rows">${variants.map(variantRowHtml).join('')}</div>
            <button type="button" class="btn btn-sm btn-outline" id="add-variant-btn">+ Add size</button>
          </div>
          ${isEdit ? `<div class="form-group"><label><input type="checkbox" id="p-active" ${product.active !== false ? 'checked' : ''} /> Active (visible in shop)</label></div>` : ''}
          <div style="display:flex;gap:10px;margin-top:18px;">
            <button type="button" class="btn btn-outline" id="cancel-modal">Cancel</button>
            <button type="submit" class="btn btn-primary" style="flex:1;">${isEdit ? 'Save changes' : 'Add product'}</button>
          </div>
        </form>
      </div>
    </div>
  `;

  document.getElementById('cancel-modal').addEventListener('click', closeModal);
  document.getElementById('add-variant-btn').addEventListener('click', () => {
    document.getElementById('variant-rows').insertAdjacentHTML('beforeend', variantRowHtml());
    attachRemoveHandlers();
  });
  attachRemoveHandlers();

  document.getElementById('product-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const rows = document.querySelectorAll('.variant-row');
    const variantsPayload = Array.from(rows).map((row) => ({
      label: row.querySelector('.v-label').value.trim(),
      price: Number(row.querySelector('.v-price').value),
      stock: Number(row.querySelector('.v-stock').value),
    })).filter((v) => v.label);

    if (!variantsPayload.length) {
      document.getElementById('modal-alert').innerHTML = `<div class="alert alert-error">Add at least one size/variant.</div>`;
      return;
    }

    const payload = {
      name: document.getElementById('p-name').value.trim(),
      category: document.getElementById('p-category').value,
      brand: document.getElementById('p-brand').value.trim(),
      description: document.getElementById('p-desc').value.trim(),
      variants: variantsPayload,
    };
    if (isEdit) payload.active = document.getElementById('p-active').checked;

    try {
      if (isEdit) await Api.adminUpdateProduct(product.id, payload);
      else await Api.adminCreateProduct(payload);
      toast(isEdit ? 'Product updated' : 'Product added');
      closeModal();
      loadProducts();
    } catch (err) {
      document.getElementById('modal-alert').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
    }
  });
}

function attachRemoveHandlers() {
  document.querySelectorAll('.remove-variant').forEach((btn) => {
    btn.onclick = () => {
      if (document.querySelectorAll('.variant-row').length > 1) btn.closest('.variant-row').remove();
    };
  });
}

function closeModal() { document.getElementById('modal-slot').innerHTML = ''; }

document.getElementById('new-product-btn').addEventListener('click', () => openModal());

loadProducts();
</script>
</body>
</html>
